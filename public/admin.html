                                    <option value="품질관리팀">품질관리팀</option>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allCustomers = [];
        document.addEventListener('DOMContentLoaded', () => {
            loadCustomers();
            loadProjects();
            loadComplaints();
            loadEmployees(); //  추가: 구성원 로드 
        });

        // 1. 고객사 관리
        async function loadCustomers() {
            const res = await fetch('/api/customers');
            allCustomers = await res.json();  //  수정: allCustomers에 저장 
            const tbody = document.getElementById('adminCustomerBody');
            
            tbody.innerHTML = '';

            allCustomers.forEach(c => {  //  수정: data → allCustomers 
                // 테이블에 행 추가
                tbody.innerHTML += `
                    <tr>
                    <td>${c.name}</td>
                        <td>${c.business_registration_number || '-'}</td>
                        <td>${c.address || '-'}</td>
                        <td>${c.establishment_date ? new Date(c.establishment_date).toLocaleDateString('ko-KR') : '-'}</td>
                        <td>${c.representative_name || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick='editCustomer(${JSON.stringify(c)})'>수정</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">삭제</button>
                        </td>
                    </tr>
                `;
            });
            
            //  추가: 고객사 목록 로드 후 필터 함수 호출 (프로젝트 선택 드롭다운 업데이트) 
            filterCustomerSelect();
        }

        function openCustomerModal() {
            document.getElementById('customerForm').reset();
            document.getElementById('custId').value = '';
            document.getElementById('custModalTitle').innerText = '고객사 등록';
            new bootstrap.Modal(document.getElementById('customerModal')).show();
        }

        function editCustomer(data) {
            document.getElementById('custId').value = data.id;
            document.getElementById('custName').value = data.name;
            document.getElementById('custRegNum').value = data.business_registration_number || '';
            document.getElementById('custAddress').value = data.address || '';
            document.getElementById('custEstDate').value = data.establishment_date ? data.establishment_date.split('T')[0] : '';
            document.getElementById('custRepName').value = data.representative_name || '';
            
            document.getElementById('custModalTitle').innerText = '고객사 수정';
            new bootstrap.Modal(document.getElementById('customerModal')).show();
        }
        function filterCustomerSelect() {
            const searchTerm = document.getElementById('customerSearchInput')?.value.toLowerCase() || '';
            const select = document.getElementById('projCustomer');
            const currentValue = select.value;  // 현재 선택된 값 저장
            
            select.innerHTML = '<option value=""></option>';
            
            const filtered = allCustomers.filter(c => {
                if (!searchTerm) return true;
                return (c.name && c.name.toLowerCase().includes(searchTerm)) ||
                    (c.business_registration_number && c.business_registration_number.includes(searchTerm));
            });
            
            filtered.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.name;
                select.appendChild(option);
            });
            
            // 검색 후에도 기존 선택값 유지
            if (currentValue) {
                select.value = currentValue;
            }
        }

        function updateCustomerSearchInput() {
            const select = document.getElementById('projCustomer');
            const searchInput = document.getElementById('customerSearchInput');
            
            if (select && searchInput && select.value) {
                // 선택된 옵션의 텍스트(회사명)를 검색창에 표시
                const selectedOption = select.options[select.selectedIndex];
                if (selectedOption && selectedOption.textContent) {
                    searchInput.value = selectedOption.textContent;
                }
            }
        }

        document.getElementById('customerForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = data.id;
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/customers/${id}` : '/api/customers';
            
            if (!id) delete data.id;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            //  수정: 탭 유지하면서 데이터만 새로고침 
            bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
            loadCustomers();
            loadProjects(); // 고객사 변경시 프로젝트 셀렉트도 업데이트
        };

        async function deleteCustomer(id) {
            if(confirm('정말 삭제하시겠습니까?')) {
                await fetch(`/api/customers/${id}`, { method: 'DELETE' });
                loadCustomers();
                loadProjects(); 
            }
        }

        // 2. 프로젝트 관리
        async function loadProjects() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const tbody = document.getElementById('adminProjectBody');
            const compSelect = document.getElementById('compProject'); // 컴플레인 모달의 프로젝트 선택 박스

            tbody.innerHTML = '';
            compSelect.innerHTML = '<option value="">선택하세요</option>';

            data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.project_code}</td>
                        <td>${p.name}</td>
                        <td>${p.customer_name}</td>
                        <td>${p.status}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick='editProject(${JSON.stringify(p)})'>수정</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProject(${p.id})">삭제</button>
                        </td>
                    </tr>
                `;
                // 컴플레인 수정용 프로젝트 옵션 추가
                compSelect.innerHTML += `<option value="${p.id}">[${p.project_code}] ${p.name}</option>`;
            });
        }

        function openProjectModal() {
            document.getElementById('projectForm').reset();
            document.getElementById('projId').value = '';
            document.getElementById('projModalTitle').innerText = '프로젝트 등록';
            new bootstrap.Modal(document.getElementById('projectModal')).show();
        }

        function editProject(data) {
            document.getElementById('projId').value = data.id;
            document.getElementById('projCode').value = data.project_code;
            document.getElementById('projName').value = data.name;
            document.getElementById('projCustomer').value = data.customer_id;
            document.getElementById('projType').value = data.product_type || '';
            document.getElementById('projStatus').value = data.status;
            document.getElementById('projModalTitle').innerText = '프로젝트 수정';
            new bootstrap.Modal(document.getElementById('projectModal')).show();
        }

        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = data.id;
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/projects/${id}` : '/api/projects';
            if (!id) delete data.id;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            //  수정: 탭 유지하면서 데이터만 새로고침 
            bootstrap.Modal.getInstance(document.getElementById('projectModal')).hide();
            loadProjects();
        }

        async function deleteProject(id) {
            if(confirm('정말 삭제하시겠습니까?')) {
                await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                loadProjects();
            }
        }

        // 3. 컴플레인 관리 (수정/삭제)
        async function loadComplaints() {
            const res = await fetch('/api/complaints');
            const data = await res.json();
            const tbody = document.getElementById('adminComplaintBody');
            tbody.innerHTML = '';
            data.forEach(c => {
                // 수정 시 필요한 데이터를 JSON 문자열로 변환 (따옴표 이스케이프 처리)
                const safeData = JSON.stringify(c).replace(/'/g, "&apos;");
                
                tbody.innerHTML += `
                    <tr>
                        <td>${c.complaint_no}</td>
                        <td>${c.project_name}</td>
                        <td>${c.title}</td>
                        <td>${c.received_date}</td>
                        <td>
                            <!--  수정 버튼 추가  -->
                            <button class="btn btn-sm btn-warning" onclick='editComplaint(${safeData})'>수정</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteComplaint(${c.id})">삭제</button>
                        </td>
                    </tr>
                `;
            });
        }

        //  수정: 컴플레인 수정 함수 - compNo 필드 제거 (주석 처리됨) 
        function editComplaint(data) {
            document.getElementById('compId').value = data.id;
            // compNo 필드가 주석 처리되어 있으므로 제거
            // document.getElementById('compNo').value = data.complaint_no;
            document.getElementById('compProject').value = data.project_id;
            document.getElementById('compTitle').value = data.title;
            document.getElementById('compManager').value = data.manager_name || '';
            
            // 날짜 포맷팅 (YYYY-MM-DD)
            if(data.received_date) {
                document.getElementById('compDate').value = data.received_date.split('T')[0];
            } else {
                document.getElementById('compDate').value = '';
            }
            
            document.getElementById('compDesc').value = data.description || '';
            document.getElementById('compReq').value = data.customer_request || '';
            
            new bootstrap.Modal(document.getElementById('complaintModal')).show();
        }

        //  컴플레인 수정 저장 
        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = data.id;
            
            // 수정 기능만 있으므로 PUT 메소드 사용
            await fetch(`/api/complaints/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            //  수정: 탭 유지하면서 데이터만 새로고침 
            bootstrap.Modal.getInstance(document.getElementById('complaintModal')).hide();
            loadComplaints();
        };

        async function deleteComplaint(id) {
            if(confirm('정말 삭제하시겠습니까?')) {
                await fetch(`/api/complaints/${id}`, { method: 'DELETE' });
                loadComplaints();
            }
        }

        //  추가: 4. 구성원 관리 
        let allEmployees = [];

        async function loadEmployees() {
            try {
                const res = await fetch('/api/employees');
                allEmployees = await res.json();
                renderEmployeeTable(allEmployees);
            } catch (err) {
                console.error('구성원 목록 로드 실패:', err);
            }
        }

        function renderEmployeeTable(data) {
            const tbody = document.getElementById('adminEmployeeBody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">등록된 구성원이 없습니다.</td></tr>';
                return;
            }
            
            data.forEach(emp => {
                const statusBadge = emp.is_active 
                    ? '<span class="badge bg-success">활성</span>' 
                    : '<span class="badge bg-secondary">비활성</span>';
                
                let authBadges = '';
                if (emp.is_superadmin) {
                    authBadges = '<span class="badge bg-danger">관리자</span>';
                } else if (emp.is_admin) {
                    authBadges = '<span class="badge bg-warning text-dark">팀장</span>';
                } else {
                    authBadges = '<span class="badge bg-light text-dark">일반</span>';
                }
                
                const safeData = JSON.stringify(emp).replace(/'/g, "&apos;");
                
                tbody.innerHTML += `
                    <tr>
                        <td>${emp.email}</td>
                        <td><strong>${emp.name}</strong></td>
                        <td>${emp.position || '-'}</td>
                        <td>${emp.department || '-'}</td>
                        <td>${emp.phone || '-'}</td>
                        <td>${statusBadge}</td>
                        <td>${authBadges}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick='editEmployee(${safeData})'>수정</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="resetPassword(${emp.id}, '${emp.name}')">비밀번호 초기화</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${emp.id}, '${emp.name}')">삭제</button>
                        </td>
                    </tr>
                `;
            });
        }

        function filterEmployees() {
            const deptFilter = document.getElementById('deptFilter').value;
            const searchTerm = document.getElementById('empSearchInput').value.toLowerCase();
            
            const filtered = allEmployees.filter(emp => {
                const matchDept = !deptFilter || emp.department === deptFilter;
                const matchSearch = !searchTerm || 
                    (emp.name && emp.name.toLowerCase().includes(searchTerm)) ||
                    (emp.email && emp.email.toLowerCase().includes(searchTerm));
                return matchDept && matchSearch;
            });
            
            renderEmployeeTable(filtered);
        }

        function openEmployeeModal() {
            document.getElementById('employeeForm').reset();
            document.getElementById('empId').value = '';
            document.getElementById('empIsActive').checked = true;
            document.getElementById('empModalTitle').innerHTML = '<i class="bi bi-person-plus me-2"></i>구성원 등록';
            new bootstrap.Modal(document.getElementById('employeeModal')).show();
        }

        function editEmployee(data) {
            document.getElementById('empId').value = data.id;
            document.getElementById('empEmail').value = data.email;
            document.getElementById('empName').value = data.name;
            document.getElementById('empPosition').value = data.position || '';
            document.getElementById('empDepartment').value = data.department || '';
            document.getElementById('empPhone').value = data.phone || '';
            document.getElementById('empIsActive').checked = data.is_active;
            document.getElementById('empIsAdmin').checked = data.is_admin;
            document.getElementById('empIsSuperadmin').checked = data.is_superadmin;
            
            document.getElementById('empModalTitle').innerHTML = '<i class="bi bi-person-gear me-2"></i>구성원 수정';
            new bootstrap.Modal(document.getElementById('employeeModal')).show();
        }

        document.getElementById('employeeForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                name: formData.get('name'),
                position: formData.get('position'),
                department: formData.get('department'),
                phone: formData.get('phone'),  
                is_active: document.getElementById('empIsActive').checked,
                is_admin: document.getElementById('empIsAdmin').checked,
                is_superadmin: document.getElementById('empIsSuperadmin').checked
            };
            
            const id = document.getElementById('empId').value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/employees/${id}` : '/api/employees';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (!res.ok) {
                    alert(result.error || '저장에 실패했습니다.');
                    return;
                }
                
                bootstrap.Modal.getInstance(document.getElementById('employeeModal')).hide();
                loadEmployees();
                alert(id ? '구성원 정보가 수정되었습니다.' : '구성원이 등록되었습니다.');
            } catch (err) {
                console.error('저장 실패:', err);
                alert('저장에 실패했습니다.');
            }
        };

        async function resetPassword(id, name) {
            if (confirm(`${name}님의 비밀번호를 1234로 초기화하시겠습니까?`)) {
                try {
                    const res = await fetch(`/api/employees/${id}/reset-password`, { method: 'PATCH' });
                    const result = await res.json();
                    alert(result.message || '비밀번호가 초기화되었습니다.');
                } catch (err) {
                    console.error('비밀번호 초기화 실패:', err);
                    alert('비밀번호 초기화에 실패했습니다.');
                }
            }
        }

        async function deleteEmployee(id, name) {
            if (confirm(`정말 ${name}님을 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.`)) {
                try {
                    await fetch(`/api/employees/${id}`, { method: 'DELETE' });
                    loadEmployees();
                    alert('구성원이 삭제되었습니다.');
                } catch (err) {
                    console.error('삭제 실패:', err);
                    alert('삭제에 실패했습니다.');
                }
            }
        }
    </script>
</body>
