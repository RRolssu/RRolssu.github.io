<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터맥 통합 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
    <style>
        /*  로그인 페이지 전용 스타일  */
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .limiter {
            width: 100%;
            margin: 0 auto;
        }

        .container-login100 {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: #f2f2f2;
        }

        .wrap-login100 {
            width: 390px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            padding: 77px 55px 33px 55px;
            box-shadow: 0 5px 10px 0px rgba(0, 0, 0, 0.1);
        }

        .login100-form {
            width: 100%;
        }

        .login100-form-title {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 30px;
            color: #333333;
            line-height: 1.2;
            text-align: center;
        }

        .login100-form-title.p-b-26 {
            padding-bottom: 26px;
        }

        .login100-form-title.p-b-48 {
            padding-bottom: 48px;
        }

        .login100-form-title img {
            width: 80px;
            height: auto;
        }

        /* Input 스타일 */
        .wrap-input100 {
            width: 100%;
            position: relative;
            border-bottom: 2px solid #adadad;
            margin-bottom: 37px;
        }

        .input100 {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            color: #555555;
            line-height: 1.2;
            display: block;
            width: 100%;
            height: 45px;
            background: transparent;
            padding: 0 5px;
            border: none;
            outline: none;
        }

        .focus-input100 {
            position: absolute;
            display: block;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .focus-input100::before {
            content: "";
            display: block;
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            transition: all 0.4s;
            background: linear-gradient(to right, #21d4fd, #b721ff);
        }

        .focus-input100::after {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            color: #999999;
            line-height: 1.2;
            content: attr(data-placeholder);
            display: block;
            width: 100%;
            position: absolute;
            top: 16px;
            left: 0px;
            padding-left: 5px;
            transition: all 0.4s;
        }

        .input100:focus + .focus-input100::after {
            top: -15px;
        }

        .input100:focus + .focus-input100::before {
            width: 100%;
        }

        .input100.has-val + .focus-input100::after {
            top: -15px;
        }

        .input100.has-val + .focus-input100::before {
            width: 100%;
        }

        .btn-show-pass {
            font-size: 15px;
            color: #999999;
            display: flex;
            align-items: center;
            position: absolute;
            height: 100%;
            top: 0;
            right: 0;
            padding-right: 5px;
            cursor: pointer;
            transition: all 0.4s;
        }

        .btn-show-pass:hover {
            color: #6a7dfe;
        }

        /* Button 스타일 */
        .container-login100-form-btn {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 13px;
        }

        .wrap-login100-form-btn {
            width: 100%;
            display: block;
            position: relative;
            z-index: 1;
            border-radius: 25px;
            overflow: hidden;
            margin: 0 auto;
        }

        .login100-form-bgbtn {
            position: absolute;
            z-index: -1;
            width: 300%;
            height: 100%;
            background: linear-gradient(to right, #21d4fd, #b721ff, #21d4fd, #b721ff);
            top: 0;
            left: -100%;
            transition: all 0.4s;
        }

        .login100-form-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: #fff;
            line-height: 1.2;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            width: 100%;
            height: 50px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .wrap-login100-form-btn:hover .login100-form-bgbtn {
            left: 0;
        }

        /* Alert 스타일 */
        .alert {
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 14px;
        }

        .alert-danger {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }

        .d-none {
            display: none;
        }

        @media (max-width: 576px) {
            .wrap-login100 {
                padding: 77px 15px 33px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="limiter">
        <div class="container-login100">
            <div class="wrap-login100">
                <form class="login100-form" id="loginForm">
                    <span class="login100-form-title p-b-26">
                        통합 로그인
                    </span>
                    <span class="login100-form-title p-b-48">
                        <img src="mainlogo.png" alt="Main Logo" style="width:80px; height:auto;">
                    </span>
                    <div id="alertBox" class="alert alert-danger d-none" role="alert">
                        <span id="alertMessage"></span>
                    </div>
                    <div class="wrap-input100">
                        <input class="input100" type="text" name="email" id="email" autocomplete="username">
                        <span class="focus-input100" data-placeholder="이메일"></span>
                    </div>
                    <div class="wrap-input100">
                        <span class="btn-show-pass" onclick="togglePassword()">
                            <i class="bi bi-eye" id="passwordIcon"></i>
                        </span>
                        <input class="input100" type="password" name="password" id="password" autocomplete="current-password">
                        <span class="focus-input100" data-placeholder="비밀번호"></span>
                    </div>
                    <div class="container-login100-form-btn">
                        <div class="wrap-login100-form-btn">
                            <div class="login100-form-bgbtn"></div>
                            <button class="login100-form-btn" type="submit">
                                로그인
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        //  추가: 입력 필드 포커스 효과 
        const inputs = document.querySelectorAll('.input100');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.classList.add('has-val');
            });
            input.addEventListener('blur', function() {
                if (this.value === '') {
                    this.classList.remove('has-val');
                }
            });
            // 기존 값이 있으면 has-val 추가
            if (input.value !== '') {
                input.classList.add('has-val');
            }
        });

        //  추가: 비밀번호 보기/숨기기 
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('bi-eye');
                passwordIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('bi-eye-slash');
                passwordIcon.classList.add('bi-eye');
            }
        }

        //  추가: 알림 표시 함수 
        function showAlert(message) {
            const alertBox = document.getElementById('alertBox');
            const alertMessage = document.getElementById('alertMessage');
            alertMessage.textContent = message;
            alertBox.classList.remove('d-none');
            setTimeout(() => {
                alertBox.classList.add('d-none');
            }, 5000);
        }

        //  변경: 로그인 폼 제출 (대시보드로 이동) 
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    //  추가: 이전 세션 정리 
                    localStorage.removeItem('django_session');
                    
                    //  추가: 새로운 JWT 토큰 저장 
                    localStorage.setItem('jwt_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    //  추가: 새로운 Django 세션 키 저장 
                    if (data.djangoSession) {
                        localStorage.setItem('django_session', data.djangoSession);
                    }
                    
                    // 대시보드로 이동
                    location.href = '/dashboard';
                } else {
                    showAlert(data.error || '로그인에 실패했습니다.');
                }
            } catch (err) {
                console.error('로그인 오류:', err);
                showAlert('서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
            }
        };
    </script>
</body>
</html>
