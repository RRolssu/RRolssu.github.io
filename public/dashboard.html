<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #f2f2f2;
        }

        .limiter {
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .container-dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .dashboard-header h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 36px;
            color: #333333;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            color: #666666;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .dashboard-card {
            background: #fff;
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 5px 10px 0px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .dashboard-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(33, 212, 253, 0.1), rgba(183, 33, 255, 0.1));
            transition: all 0.4s;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px 0px rgba(0, 0, 0, 0.15);
        }

        .dashboard-card:hover::before {
            left: 100%;
        }

        .dashboard-card-icon {
            font-size: 60px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .dashboard-card-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 20px;
            color: #333333;
            position: relative;
            z-index: 1;
        }

        .dashboard-card:hover .dashboard-card-title {
            color: #6a7dfe;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="limiter">
        <div class="container-dashboard">
            <div class="dashboard-header">
                <h1>통합 대시보드</h1>
                <p>사용할 서비스를 선택하세요</p>
            </div>
            
            <div class="dashboard-grid" id="sitesGrid">
                <!-- 동적으로 생성 -->
            </div>
        </div>
    </div>

    <script>
        //  추가: 6개 사이트 정보 
        const sites = [
            { 
                name: '회사 홈페이지', 
                url: 'http://www.inter-mac.co.kr/', 
                icon: '🏠',
                isInternal: false
            },
            { 
                name: '하이웍스', 
                url: 'https://home.office.hiworks.com/', 
                icon: '💼',
                isInternal: false
            },
            { 
                name: '이카운트', 
                url: 'https://login.ecount.com/', 
                icon: '📊',
                isInternal: false
            },
            { 
                name: '스케줄러', 
                url: 'http://112.223.244.5:8222/gantt/', 
                icon: '📅',
                isInternal: true,
                type: 'scheduler'
            },
            { 
                name: '관리', 
                url: 'http://112.223.244.5:8224/', 
                icon: '⚙️',
                isInternal: true,
                type: 'complain'
            },
            { 
                name: '나스', 
                url: 'http://112.223.244.2:5000', 
                icon: '💾',
                isInternal: false
            }
        ];

        //  추가: 그리드에 카드 생성 
        const grid = document.getElementById('sitesGrid');
        sites.forEach(site => {
            const card = document.createElement('div');
            card.className = 'dashboard-card';
            card.onclick = () => goToSite(site.url, site.isInternal, site.type || '');
            card.innerHTML = `
                <div class="dashboard-card-icon">${site.icon}</div>
                <div class="dashboard-card-title">${site.name}</div>
            `;
            grid.appendChild(card);
        });

        //  추가: 사이트로 이동하는 함수 
        function goToSite(url, isInternal, type) {
            if (isInternal) {
                if (type === 'scheduler') {
                    // 스케줄러: 세션 설정 엔드포인트를 통해 이동
                    const djangoSession = localStorage.getItem('django_session');
                    if (djangoSession) {
                        //  변경: 세션 설정 엔드포인트로 이동 
                        window.location.href = `http://112.223.244.5:8222/set-session/?session=${djangoSession}`;
                    } else {
                        // 세션이 없으면 통합 로그인으로
                        window.location.href = 'http://112.223.244.5:8224/login';
                    }
                } else if (type === 'complain') {
                    // 통합관리: 현재 창에서 이동
                    window.location.href = url;
                }
            } else {
                // 외부 시스템: 현재 창에서 이동
                window.location.href = url;
            }
        }

        //  추가: 로그인 체크 (토큰이 없으면 로그인 페이지로) 
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                location.href = '/login';
            }
        });
    </script>
</body>
</html>
