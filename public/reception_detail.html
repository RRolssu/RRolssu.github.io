<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인터맥 통합 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><i class="bi bi-clipboard-check me-2"></i>접수 상세</h3>
            <div>
                <!--  추가: 수정 버튼  -->
                <button class="btn btn-outline-primary me-2" onclick="openEditModal()">
                    <i class="bi bi-pencil me-1"></i> 수정
                </button>
                <button class="btn btn-danger me-2" onclick="deleteReception()">
                    <i class="bi bi-trash me-1"></i> 삭제
                </button>
                <button class="btn btn-warning me-2" id="btnQcConfirm" onclick="toggleQcConfirm()">
                    <i class="bi bi-check-circle me-1"></i> QC 확인
                </button>
                <!-- <button class="btn btn-success" onclick="convertToComplaint()">
                    <i class="bi bi-arrow-right-circle me-1"></i> 클레임으로 전환
                </button> -->
            </div>
        </div>
        
        <!-- 기본 정보 -->
        <div class="info-header rounded-top">
            <i class="bi bi-info-circle me-2"></i>접수 정보
        </div>
        <div class="bg-white border border-top-0 p-4 mb-4 rounded-bottom shadow-sm">
            <div class="row mb-3">
                <div class="col-md-4">
                    <strong>접수번호:</strong> <span id="info_no" class="ms-2">-</span>
                </div>
                <div class="col-md-4">
                    <strong>접수일:</strong> <span id="info_date" class="ms-2">-</span>
                </div>
                <div class="col-md-4">
                    <strong>접수경로:</strong> <span id="info_channel" class="ms-2">-</span>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <strong>부서:</strong> <span id="info_dept" class="ms-2">-</span>
                </div>
                <div class="col-md-4">
                    <strong>접수자:</strong> <span id="info_receptionist" class="ms-2">-</span>
                </div>
                <div class="col-md-4">
                    <strong>고객명:</strong> <span id="info_customer" class="ms-2">-</span>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <strong>요청기한:</strong> <span id="info_deadline" class="ms-2">-</span>
                </div>
                <div class="col-md-4">
                    <strong>긴급:</strong> <span id="info_urgent" class="ms-2">-</span>
                </div>
                <div class="col-md-4">
                    <strong>QC 확인:</strong> <span id="info_confirmed" class="ms-2">-</span>
                </div>
            </div>
            <hr>
            <div class="mb-3">
                <strong>제목:</strong>
                <div id="info_title" class="mt-2 fs-5 fw-semibold">-</div>
            </div>
            <div class="mb-3">
                <strong>내용:</strong>
                <div id="info_content" class="mt-2 p-3 bg-light rounded" style="white-space: pre-wrap;">-</div>
            </div>
            <div class="mb-3">
                <strong>고객 요청사항:</strong>
                <div id="info_customer_request" class="mt-2 p-3 bg-light rounded" style="white-space: pre-wrap;">-</div>
            </div>
        </div>

        <!-- 첨부파일 -->
        <div class="attachment-header rounded-top">
            <i class="bi bi-paperclip me-2"></i>첨부파일
        </div>
        <div class="bg-white border border-top-0 p-4 mb-4 rounded-bottom shadow-sm">
            <div id="attachmentArea">
                <p class="text-muted mb-0">첨부파일이 없습니다.</p>
            </div>
        </div>
        
        <div class="mt-3">
            <a href="/접수.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-1"></i> 목록으로
            </a>
        </div>
    </div>

    <!-- 접수 수정 모달  -->
    <div class="modal fade" id="editReceptionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>접수 정보 수정</h5>
                </div>
                <div class="modal-body">
                    <form id="editReceptionForm">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">제목 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editTitle" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">고객명 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editCustomerName" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">부서 <span class="text-danger">*</span></label>
                                <select class="form-select" id="editDepartment" required>
                                    <option value="">선택하세요</option>
                                    <option value="경영지원팀">경영지원팀</option>
                                    <option value="기획팀">기획팀</option>
                                    <option value="기술지원팀">기술지원팀</option>
                                    <option value="생산기술팀">생산기술팀</option>
                                    <option value="품질관리팀">품질관리팀</option>
                                    <option value="소프트웨어개발팀">소프트웨어개발팀</option>
                                    <option value="하드웨어개발팀">하드웨어개발팀</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">접수자 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editReceptionist" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">접수경로 <span class="text-danger">*</span></label>
                                <!-- ★★★★ 수정: 체크박스로 변경 (중복 선택 가능) ★★★★ -->
                                <div class="d-flex gap-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="edit_reception_channel" id="editChannelMail" value="메일">
                                        <label class="form-check-label" for="editChannelMail">
                                            <i class="bi bi-envelope me-1"></i> 메일
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="edit_reception_channel" id="editChannelPhone" value="유선">
                                        <label class="form-check-label" for="editChannelPhone">
                                            <i class="bi bi-telephone me-1"></i> 유선
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="edit_reception_channel" id="editChannelField" value="현장발생">
                                        <label class="form-check-label" for="editChannelField">
                                            <i class="bi bi-geo-alt me-1"></i> 현장발생
                                        </label>
                                    </div>
                                </div>
                                <small class="text-muted">여러 개 선택 가능</small>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">요청기한</label>
                                <input type="date" class="form-control" id="editDeadline">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">긴급 여부</label>
                                <div class="form-check mt-2">
                                    <input class="form-check-input" type="checkbox" id="editIsUrgent">
                                    <label class="form-check-label" for="editIsUrgent">긴급</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">첨부파일</label>
                            
                            <!-- 기존 첨부파일 표시 -->
                            <div id="currentAttachments" class="mb-2">
                                <!-- 기존 파일들이 여기에 표시됩니다 -->
                            </div>
                            
                            <!-- 새 파일 추가 -->
                            <input type="file" class="form-control" id="editAttachments" multiple>
                            <small class="text-muted">새로운 파일을 선택하면 기존 파일에 추가됩니다. 기존 파일을 삭제하려면 파일명을 클릭하세요.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">내용</label>
                            <textarea class="form-control" id="editContent" rows="4"></textarea>
                        </div>
                        <!-- ★★★★ 추가: 고객 요청사항 필드 ★★★★ -->
                        <div class="mb-3">
                            <label class="form-label">고객 요청사항</label>
                            <textarea class="form-control" id="editCustomerRequest" rows="3" placeholder="고객이 요청한 내용을 입력하세요"></textarea>
                            <small class="text-muted">컴플레인으로 자동 등록될 때 사용됩니다.</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">저장</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const receptionId = urlParams.get('id');
        let currentReception = null;
        let filesToRemove = [];

        if (!receptionId) {
            alert('잘못된 접근입니다.');
            location.href = '/접수.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) { location.href = '/login.html'; return; }
            loadReceptionDetails();
        });

        async function loadReceptionDetails() {
            try {
                const res = await fetch(`/api/receptions/${receptionId}`);
                if (!res.ok) throw new Error('Failed to fetch');
                currentReception = await res.json();
                
                // ★★★★ 수정: 기본 정보 표시 간소화 ★★★★
                const d = currentReception;
                document.getElementById('info_no').innerText = d.reception_no || '-';
                document.getElementById('info_date').innerText = d.reception_date || '-';
                document.getElementById('info_dept').innerText = d.department || '-';
                document.getElementById('info_receptionist').innerText = d.receptionist || '-';
                document.getElementById('info_customer').innerText = d.customer_name || '-';
                document.getElementById('info_deadline').innerText = d.deadline || '-';
                document.getElementById('info_title').innerText = d.title || '-';
                let contentText = d.content || '-';
                let contentHtml = contentText;
                
                // [이미지: URL] 패턴을 찾아서 실제 이미지로 변환
                contentHtml = contentHtml.replace(/\[이미지:\s*([^\]]+)\]/g, (match, url) => {
                    const imageUrl = url.trim();
                    return `<div class="my-3"><img src="${imageUrl}" alt="첨부 이미지" class="img-fluid rounded border" style="max-width: 600px; max-height: 400px; cursor: pointer;" onclick="window.open('${imageUrl}', '_blank')"><br><small class="text-muted">클릭하여 원본 보기</small></div>`;
                });
                
                // innerHTML로 변경하여 이미지 표시
                document.getElementById('info_content').innerHTML = contentHtml || '-';
                document.getElementById('info_customer_request').innerText = d.customer_request || '-';
                
                // 접수 경로
                const channels = currentReception.reception_channel;
                let channelDisplay = '-';
                try {
                    const channelArray = JSON.parse(channels);
                    if (Array.isArray(channelArray)) {
                        channelDisplay = channelArray.map(ch => {
                            const icons = { '메일': 'envelope text-primary', '유선': 'telephone text-success', '현장발생': 'geo-alt text-warning' };
                            const icon = icons[ch] || '';
                            return icon ? `<i class="bi bi-${icon}"></i> ${ch}` : ch;
                        }).join(', ');
                    }
                } catch (e) {
                    // 단일 값인 경우 (하위 호환)
                    const channelIcons = { '메일': 'envelope text-primary', '유선': 'telephone text-success', '현장발생': 'geo-alt text-warning' };
                    const icon = channelIcons[channels] || '';
                    channelDisplay = icon ? `<i class="bi bi-${icon}"></i> ${channels}` : channels;
                }
                document.getElementById('info_channel').innerHTML = channelDisplay || '-';

                
                // 긴급/QC
                document.getElementById('info_urgent').innerHTML = d.is_urgent 
                    ? '<span class="badge bg-danger"><i class="bi bi-exclamation-triangle-fill"></i> 긴급</span>' 
                    : '<span class="badge bg-secondary">일반</span>';
                updateQcDisplay(d.dept_confirmed);
                
                // ★★★★ 수정: 첨부파일 표시 - 단일 함수로 통합 ★★★★
                displayAttachments();

            } catch (err) {
                console.error('Error loading reception details:', err);
                alert('데이터를 불러오는데 실패했습니다.');
            }
        }

        // ★★★★ 수정: 첨부파일 표시 함수 - 원본 파일명 지원 ★★★★
        function displayAttachments() {
            const area = document.getElementById('attachmentArea');
            if (!currentReception?.attachment_path) {
                area.innerHTML = '<p class="text-muted mb-0">첨부파일이 없습니다.</p>';
                return;
            }
            try {
                const files = JSON.parse(currentReception.attachment_path);
                
                // ★★★★ 수정: 파일 정보가 객체인 경우와 문자열인 경우 모두 처리 ★★★★
                const fileList = Array.isArray(files) ? files : [files];
                const displayFiles = fileList.filter(f => {
                    if (typeof f === 'string') {
                        return !filesToRemove.includes(f);
                    } else if (f && typeof f === 'object') {
                        return !filesToRemove.includes(f.path || f.filename || f);
                    }
                    return true;
                });
                
                if (displayFiles.length === 0) {
                    area.innerHTML = '<p class="text-muted mb-0">첨부파일이 없습니다.</p>';
                    return;
                }
                
                area.innerHTML = '<ul class="list-unstyled mb-0">' + 
                    displayFiles.map(file => {
                        // 파일 정보가 객체인 경우 (filename, originalname, path)
                        if (typeof file === 'object' && file !== null) {
                            const filePath = file.path || file.filename || '';
                            const safePath = filePath.replace(/\\/g, '/');
                            const displayName = file.originalname || file.filename || safePath.split('/').pop() || '파일';
                            return `<li class="mb-2"><i class="bi bi-file-earmark me-2"></i><a href="${safePath}" target="_blank">${displayName}</a></li>`;
                        }
                        // 파일 정보가 문자열인 경우 (하위 호환)
                        const safePath = String(file).replace(/\\/g, '/');
                        const fileName = safePath.split('/').pop();
                        return `<li class="mb-2"><i class="bi bi-file-earmark me-2"></i><a href="${safePath}" target="_blank">${fileName}</a></li>`;
                    }).join('') + '</ul>';
            } catch (e) {
                // 단일 파일 경로인 경우 (하위 호환)
                try {
                    const safePath = String(currentReception.attachment_path).replace(/\\/g, '/');
                    const fileName = safePath.split('/').pop();
                    area.innerHTML = `<i class="bi bi-file-earmark me-2"></i><a href="${safePath}" target="_blank">${fileName}</a>`;
                } catch (e2) {
                    area.innerHTML = '<p class="text-muted mb-0">첨부파일 정보를 불러올 수 없습니다.</p>';
                }
            }
        }

        async function deleteReception() {
            if (!currentReception || !confirm('정말로 이 접수 건을 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.')) return;
            try {
                const res = await fetch(`/api/receptions/${receptionId}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('접수가 삭제되었습니다.');
                    location.href = '/접수.html';
                } else throw new Error('Delete failed');
            } catch (err) {
                console.error('Error deleting reception:', err);
                alert('삭제에 실패했습니다.');
            }
        }

        function updateQcDisplay(confirmed) {
            const btn = document.getElementById('btnQcConfirm');
            const infoConfirmed = document.getElementById('info_confirmed');
            if (confirmed) {
                infoConfirmed.innerHTML = '<span class="badge bg-success"><i class="bi bi-check-lg"></i> 확인 완료</span>';
                btn.className = 'btn btn-outline-success me-2';
                btn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> QC 확인됨';
            } else {
                infoConfirmed.innerHTML = '<span class="badge bg-secondary">미확인</span>';
                btn.className = 'btn btn-warning me-2';
                btn.innerHTML = '<i class="bi bi-check-circle me-1"></i> QC 확인';
            }
        }

        async function toggleQcConfirm() {
            if (!currentReception) return;
            const newStatus = !currentReception.dept_confirmed;
            if (!confirm(newStatus ? 'QC 확인 처리하시겠습니까?\n확인 처리 시 자동으로 컴플레인이 생성됩니다.' : 'QC 확인을 취소하시겠습니까?')) return;
            
            const user = getCurrentUser();
            const confirmedBy = user ? user.name : 'QC담당자';
            
            try {
                const res = await fetch(`/api/receptions/${receptionId}/confirm`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ confirmed_by: confirmedBy })
                });
                
                if (res.ok) {
                    const result = await res.json();
                    currentReception.dept_confirmed = newStatus;
                    updateQcDisplay(newStatus);
                    
                    if (result.complaint_created) {
                        // ★★★★ 추가: 컴플레인 생성 성공 알림 ★★★★
                        alert(`QC 확인 처리되었습니다.\n자동으로 컴플레인이 생성되었습니다.\n컴플레인 번호: ${result.complaint_no}`);
                        
                        // 컴플레인 상세 페이지로 이동 여부 선택
                        if (confirm('생성된 컴플레인을 확인하시겠습니까?')) {
                            window.open(`/complaint_detail.html?id=${result.complaint_id}`, '_blank');
                        }
                    } else {
                        alert(result.message || 'QC 확인 처리되었습니다.');
                    }
                } else throw new Error('Update failed');
            } catch (err) {
                console.error('Error updating QC status:', err);
                alert('처리에 실패했습니다.');
            }
        }

        function openEditModal() {
            if (!currentReception) return;
            const d = currentReception;
            document.getElementById('editTitle').value = d.title || '';
            document.getElementById('editCustomerName').value = d.customer_name || '';
            document.getElementById('editDepartment').value = d.department || '';
            document.getElementById('editReceptionist').value = d.receptionist || '';
            
            // ★★★★ 수정: 접수 경로 체크박스 설정 (JSON 배열 또는 단일 값 지원) ★★★★
            document.getElementById('editChannelMail').checked = false;
            document.getElementById('editChannelPhone').checked = false;
            document.getElementById('editChannelField').checked = false;
            
            try {
                let channels = d.reception_channel;
                if (channels && typeof channels === 'string' && channels.startsWith('[')) {
                    channels = JSON.parse(channels);
                }
                if (Array.isArray(channels)) {
                    channels.forEach(ch => {
                        if (ch === '메일') document.getElementById('editChannelMail').checked = true;
                        if (ch === '유선') document.getElementById('editChannelPhone').checked = true;
                        if (ch === '현장발생') document.getElementById('editChannelField').checked = true;
                    });
                } else {
                    // 단일 값인 경우 (하위 호환)
                    if (channels === '메일' || !channels) document.getElementById('editChannelMail').checked = true;
                    if (channels === '유선') document.getElementById('editChannelPhone').checked = true;
                    if (channels === '현장발생') document.getElementById('editChannelField').checked = true;
                }
            } catch (e) {
                // 파싱 실패 시 기본값
                document.getElementById('editChannelMail').checked = true;
            }
            
            document.getElementById('editDeadline').value = d.deadline ? d.deadline.split('T')[0] : '';
            document.getElementById('editIsUrgent').checked = d.is_urgent;
            document.getElementById('editContent').value = d.content || '';
            document.getElementById('editCustomerRequest').value = d.customer_request || '';

            const fileInput = document.getElementById('editAttachments');
            fileInput.value = '';
            if (fileInput.value) {
                // 브라우저 호환성을 위한 추가 처리
                fileInput.type = 'text';
                fileInput.type = 'file';
            }
            
            filesToRemove = [];
            displayModalAttachments();
            new bootstrap.Modal(document.getElementById('editReceptionModal')).show();
        }

        // ★★★★ 수정: 모달 첨부파일 표시 함수 간소화 ★★★★
        function displayModalAttachments() {
            const container = document.getElementById('currentAttachments');
            if (!container) {
                console.error('currentAttachments 요소를 찾을 수 없습니다.');
                return;
            }
            
            container.innerHTML = '';
            if (!currentReception?.attachment_path) {
                container.innerHTML = '<p class="text-muted mb-0 small">기존 첨부파일이 없습니다.</p>';
                return;
            }
            
            try {
                let files = JSON.parse(currentReception.attachment_path);
                if (!Array.isArray(files)) {
                    // 단일 객체인 경우 배열로 변환
                    if (typeof files === 'object' && files !== null) {
                        files = [files];
                    } else if (typeof files === 'string') {
                        // 단일 문자열 경로인 경우 (하위 호환)
                        files = [files];
                    } else {
                        files = [];
                    }
                }
                
                const displayFiles = files.filter(fileItem => {
                    // ★★★★ 수정: 객체 배열 처리 ★★★★
                    if (typeof fileItem === 'string') {
                        return !filesToRemove.includes(fileItem);
                    } else if (fileItem && typeof fileItem === 'object') {
                        const filePath = fileItem.path || fileItem.filename || '';
                        return filePath && !filesToRemove.includes(filePath) && !filesToRemove.includes(fileItem);
                    }
                    return false;
                });
                
                if (displayFiles.length === 0) {
                    container.innerHTML = '<p class="text-muted mb-0 small">기존 첨부파일이 없습니다.</p>';
                    return;
                }
                
                displayFiles.forEach((fileItem, index) => {
                    // ★★★★ 수정: 객체 또는 문자열 경로 처리 ★★★★
                    let filePath, displayName;
                    
                    if (typeof fileItem === 'string') {
                        // 문자열 경로인 경우 (하위 호환)
                        filePath = fileItem;
                        displayName = filePath.split('/').pop() || '파일';
                    } else if (fileItem && typeof fileItem === 'object') {
                        // 객체인 경우
                        filePath = fileItem.path || fileItem.filename || '';
                        displayName = fileItem.originalname || fileItem.filename || filePath.split('/').pop() || '파일';
                    } else {
                        return; // 처리 불가
                    }
                    
                    const safePath = filePath.replace(/\\/g, '/');
                    const div = document.createElement('div');
                    div.className = 'd-flex align-items-center mb-2 p-2 border rounded';
                    
                    // ★★★★ 수정: 인덱스를 사용하여 제거 함수 호출 ★★★★
                    const fileData = JSON.stringify(fileItem);
                    div.innerHTML = `
                        <i class="bi bi-file-earmark me-2 text-primary"></i>
                        <a href="${safePath}" target="_blank" class="text-decoration-none flex-grow-1">${displayName}</a>
                        <button type="button" class="btn btn-sm btn-outline-danger ms-2" onclick="removeAttachmentByIndex(${index}, this)">
                            <i class="bi bi-trash"></i> 삭제
                        </button>`;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error('첨부파일 표시 오류:', e);
                container.innerHTML = '<p class="text-danger mb-0 small">첨부파일 정보를 불러올 수 없습니다.</p>';
            }
        }

        function removeAttachmentByIndex(index, btn) {
            if (!currentReception?.attachment_path) return;
            
            try {
                let files = JSON.parse(currentReception.attachment_path);
                if (!Array.isArray(files)) {
                    if (typeof files === 'object' && files !== null) {
                        files = [files];
                    } else if (typeof files === 'string') {
                        files = [files];
                    } else {
                        files = [];
                    }
                }
                
                if (index >= 0 && index < files.length) {
                    const fileItem = files[index];
                    if (!confirm('이 파일을 삭제하시겠습니까?\n삭제된 파일은 수정 저장 시 제거됩니다.')) return;
                    
                    if (typeof fileItem === 'string') {
                        filesToRemove.push(fileItem);
                    } else if (fileItem && typeof fileItem === 'object') {
                        const filePath = fileItem.path || fileItem.filename || '';
                        if (filePath) {
                            filesToRemove.push(filePath);
                        }
                        filesToRemove.push(fileItem);
                    }
                    
                    btn.closest('.d-flex').remove();
                    displayModalAttachments();
                    displayAttachments();
                }
            } catch (e) {
                console.error('첨부파일 제거 오류:', e);
                alert('파일 제거 중 오류가 발생했습니다.');
            }
        }

        function removeAttachment(fileItem, btn) {
            // 기존 함수는 유지하되, 객체와 문자열 모두 처리
            if (!confirm('이 파일을 삭제하시겠습니까?\n삭제된 파일은 수정 저장 시 제거됩니다.')) return;
            
            if (typeof fileItem === 'string') {
                filesToRemove.push(fileItem);
            } else if (fileItem && typeof fileItem === 'object') {
                const filePath = fileItem.path || fileItem.filename || '';
                if (filePath) {
                    filesToRemove.push(filePath);
                }
                filesToRemove.push(fileItem);
            }
            
            btn.closest('.d-flex').remove();
            displayModalAttachments();
            displayAttachments();
        }

        document.getElementById('editReceptionForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('editTitle').value);
            formData.append('customer_name', document.getElementById('editCustomerName').value);
            formData.append('department', document.getElementById('editDepartment').value);
            formData.append('receptionist', document.getElementById('editReceptionist').value);
            
            // ★★★★ 수정: 접수 경로 체크박스 값들을 배열로 처리 ★★★★
            const selectedChannels = [];
            document.querySelectorAll('input[name="edit_reception_channel"]:checked').forEach(cb => {
                selectedChannels.push(cb.value);
            });
            
            if (selectedChannels.length === 0) {
                alert('접수 경로를 최소 1개 이상 선택해주세요.');
                return;
            }
            
            formData.append('reception_channel', JSON.stringify(selectedChannels));
            
            formData.append('deadline', document.getElementById('editDeadline').value.trim() || null);
            formData.append('is_urgent', document.getElementById('editIsUrgent').checked ? 1 : 0);
            formData.append('content', document.getElementById('editContent').value);
            formData.append('customer_request', document.getElementById('editCustomerRequest').value);
            
            if (filesToRemove.length > 0) {
                formData.append('filesToRemove', JSON.stringify(filesToRemove));
            }
            
            const newFiles = document.getElementById('editAttachments').files;
            for (let i = 0; i < newFiles.length; i++) {
                formData.append('attachments', newFiles[i]);
            }
            
            try {
                const res = await fetch(`/api/receptions/${receptionId}`, { method: 'PUT', body: formData });
                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('editReceptionModal')).hide();
                    alert('수정되었습니다.');
                    filesToRemove = [];
                    await loadReceptionDetails();
                } else throw new Error('Update failed');
            } catch (err) {
                console.error('Error updating reception:', err);
                alert('수정에 실패했습니다.');
            }
        };
    </script>
</body>
