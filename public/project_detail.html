<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인터맥 통합 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- ★★★★ 추가: 네비게이션 바 (외부 링크 포함) ★★★★ -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <!-- ★★★★ 추가: 프로젝트 기본 정보 카드 ★★★★ -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-folder2-open me-2"></i>프로젝트 정보</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <strong>프로젝트 코드:</strong>
                        <p id="projectCode">-</p>
                    </div>
                    <div class="col-md-3">
                        <strong>프로젝트명:</strong>
                        <p id="projectName">-</p>
                    </div>
                    <div class="col-md-3">
                        <strong>고객사:</strong>
                        <p id="customerName">-</p>
                    </div>
                    <div class="col-md-3">
                        <strong>상태:</strong>
                        <p id="projectStatus">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ★★★★ 추가: 자료 업로드 버튼 ★★★★ -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-files me-2"></i>프로젝트 자료</h4>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="bi bi-upload me-1"></i> 자료 업로드
            </button>
        </div>

        <!-- ★★★★ 추가: 자료 유형별 탭 ★★★★ -->
        <ul class="nav nav-tabs mb-3" id="docTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all" type="button">전체</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="drawing-tab" data-bs-toggle="tab" data-bs-target="#drawing" type="button">도면</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="spec-tab" data-bs-toggle="tab" data-bs-target="#spec" type="button">사양서</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="software-tab" data-bs-toggle="tab" data-bs-target="#software" type="button">S/W</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="quality-tab" data-bs-toggle="tab" data-bs-target="#quality" type="button">품질 문서</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="requirement-tab" data-bs-toggle="tab" data-bs-target="#requirement" type="button">고객 요구사항</button>
            </li>
            
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="etc-tab" data-bs-toggle="tab" data-bs-target="#etc" type="button">기타</button>
            </li>
        </ul>

        <!-- ★★★★ 추가: 자료 목록 테이블 ★★★★ -->
        <div class="table-responsive bg-white border rounded">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="text-center" style="width: 12%;">유형</th>
                        <th class="text-center" style="width: 18%;">제목</th>
                        <th class="text-center" style="width: 30%;">설명</th>
                        <th class="text-center" style="width: 9%;">작성자</th>
                        <th class="text-center" style="width: 12%;">등록일</th>
                        <th class="text-center" style="width: 10%;">파일</th>
                        <th class="text-center" style="width: 5%;">삭제</th>
                    </tr>
                </thead>
                <tbody id="documentTableBody">
                    <!-- 자료 목록이 여기에 표시됩니다 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- ★★★★ 추가: 자료 업로드 모달 ★★★★ -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upload me-2"></i>자료 업로드</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">문서 유형 <span class="text-danger">*</span></label>
                            <select class="form-select" name="doc_type" required>
                                <option value="">선택하세요</option>
                                <option value="도면">도면</option>
                                <option value="사양서">사양서</option>
                                <option value="S/W">S/W</option>
                                <option value="품질 문서">품질 문서</option>
                                <option value="고객 요구사항">고객 요구사항</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">제목 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <!-- <div class="mb-3">
                            <label class="form-label">버전</label>
                            <input type="text" class="form-control" name="version" placeholder="예: v1.0.0">
                        </div> -->
                        <div class="mb-3">
                            <label class="form-label">설명</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">작성자 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="uploader_name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">파일 첨부</label>
                            <input type="file" class="form-control" name="file" multiple>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">업로드</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentFilter = '전체';

        document.addEventListener('DOMContentLoaded', async () => {
            // ★★★★ 추가: 로그인 체크 ★★★★
            const user = getCurrentUser();
            if (!user) { location.href = '/login.html'; return; }
            
            if (!projectId) {
                alert('프로젝트 ID가 없습니다.');
                location.href = '/projects';
                return;
            }
            await loadProjectInfo();
            await loadDocuments();
            setupTabFilters();
        });

        async function loadProjectInfo() {
            try {
                const res = await fetch(`/api/projects/${projectId}`);
                const project = await res.json();
                document.getElementById('projectCode').textContent = project.project_code;
                document.getElementById('projectName').textContent = project.name;
                document.getElementById('customerName').textContent = project.customer_name;
                document.getElementById('projectStatus').textContent = project.status;
                document.title = `${project.name} - 프로젝트 상세`;
            } catch (err) {
                console.error('프로젝트 정보 로드 실패:', err);
            }
        }

        async function loadDocuments(filter = '전체') {
            try {
                const res = await fetch(`/api/projects/${projectId}/documents`);
                const documents = await res.json();
                
                let filtered = documents;
                if (filter !== '전체') {
                    filtered = documents.filter(doc => doc.doc_type === filter);
                }
                
                renderDocuments(filtered);
            } catch (err) {
                console.error('문서 목록 로드 실패:', err);
            }
        }

        function renderDocuments(documents) {
            const tbody = document.getElementById('documentTableBody');
            tbody.innerHTML = '';
            
            if (documents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">등록된 자료가 없습니다.</td></tr>';
                return;
            }
            
            documents.forEach(doc => {
                const uploadDate = new Date(doc.uploaded_at).toLocaleDateString('ko-KR');
                const fileBtn = doc.file_path 
                    ? `<a href="${doc.file_path}" class="btn btn-sm btn-outline-primary" target="_blank"><i class="bi bi-download"></i> 다운로드</a>`
                    : '-';
                    const deleteBtn = `<button class="btn btn-sm btn-outline-danger btn-xs" onclick="deleteDocument(${doc.id})" style="padding: 0.125rem 0.25rem; font-size: 0.75rem;"><i class="bi bi-trash"></i></button>`;
                tbody.innerHTML += `
                    <tr>
                        <td class="text-center"><span class="badge bg-secondary">${doc.doc_type}</span></td>
                        <td>${doc.title}</td>
                        <td>${doc.description || '-'}</td>
                        <td class="text-center">${doc.uploader_name}</td>
                        <td class="text-center">${uploadDate}</td>
                        <td class="text-center">${fileBtn}</td>
                        <td class="text-center">${deleteBtn}</td>
                    </tr>
                `;
            });
        }

        function setupTabFilters() {
            const tabs = {
                'all-tab': '전체',
                'drawing-tab': '도면',
                'spec-tab': '사양서',
                'software-tab': 'S/W',
                'quality-tab': '품질 문서',
                'requirement-tab': '고객 요구사항',
                'etc-tab': '기타'
            };
            
            Object.keys(tabs).forEach(tabId => {
                document.getElementById(tabId).addEventListener('click', () => {
                    loadDocuments(tabs[tabId]);
                });
            });
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            formData.append('project_id', projectId);
            
            try {
                await fetch(`/api/projects/${projectId}/documents`, {
                    method: 'POST',
                    body: formData
                });
                
                const modal = bootstrap.Modal.getInstance(document.getElementById('uploadModal'));
                modal.hide();
                e.target.reset();
                await loadDocuments();
                alert('자료가 업로드되었습니다.');
            } catch (err) {
                console.error('업로드 실패:', err);
                alert('업로드에 실패했습니다.');
            }
        };
        async function deleteDocument(documentId) {
            if (!confirm('정말로 이 자료를 삭제하시겠습니까?\n삭제된 자료는 복구할 수 없습니다.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/projects/${projectId}/documents/${documentId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('자료가 삭제되었습니다.');
                    await loadDocuments(currentFilter);
                } else {
                    throw new Error('삭제 실패');
                }
            } catch (err) {
                console.error('삭제 실패:', err);
                alert('자료 삭제에 실패했습니다.');
            }
        }
    </script>
</body>
</html>
