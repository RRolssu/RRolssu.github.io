<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터맥 통합 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container mt-5">
        
        
        <!--  대시보드 요약 카드 영역 (아이콘 포함)  -->
        <div class="row g-4 mb-5">
            <!-- ★★★★ 수정: 전체 컴플레인 - id 추가하여 동적 연동 ★★★★ -->
            <div class="col-md-4">
                <div class="card h-100 border-start border-4 border-primary">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-muted mb-2">전체 컴플레인</h6>
                            <h2 class="display-6 fw-bold mb-0 text-dark" id="totalComplaintsCount">0</h2>
                        </div>
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary">
                            <i class="bi bi-folder2-open fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- ★★★★ 수정: 조치 중 (미결) ★★★★ -->
            <div class="col-md-4">
                <div class="card h-100 border-start border-4 border-warning">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-muted mb-2">조치 중 (미결)</h6>
                            <h2 class="display-6 fw-bold mb-0 text-warning" id="unresolvedCount">0</h2>
                        </div>
                        <div class="bg-warning bg-opacity-10 p-3 rounded-circle text-warning">
                            <i class="bi bi-exclamation-triangle fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ★★★★ 수정: 조치 완료 - id 추가 ★★★★ -->
            <div class="col-md-4">
                <div class="card h-100 border-start border-4 border-success">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-muted mb-2">조치 완료</h6>
                            <h2 class="display-6 fw-bold mb-0 text-success" id="completedCount">0</h2>
                        </div>
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle text-success">
                            <i class="bi bi-check-circle fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="fw-bold mb-3">프로젝트 진행 현황</h3>
        <div class="table-responsive bg-white p-4 rounded-3 shadow-sm mb-5">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="py-3">프로젝트 코드</th>
                        <th class="py-3">프로젝트명</th>
                        <th class="py-3">고객사</th>
                        <th class="py-3">제품유형</th>
                        <th class="py-3">상태</th>
                    </tr>
                </thead>
                <tbody id="dashboardTableBody">
                    <!-- Data will be loaded here via JS -->
                </tbody>
            </table>
        </div>

        <h3 class="fw-bold mb-3">접수된 클레임</h3>
        <!-- 테이블 클래스에 table-hover 추가 및 컨테이너 스타일 적용 -->
        <div class="table-responsive bg-white p-4 rounded-3 shadow-sm mb-5">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="py-3">접수번호</th>
                        <th class="py-3">제목</th>
                        <th class="py-3">고객명</th>
                        <th class="py-3">부서</th>
                        <th class="py-3">접수자</th>
                        <th class="py-3">접수일</th>
                        <th class="py-3">요청기한</th>
                        <th class="py-3">긴급</th>
                        <th class="py-3">접수경로</th>
                        <th class="py-3">QC확인</th>
                    </tr>
                </thead>
                <tbody id="recentReceptionsTableBody">
                    <!-- 접수 목록이 여기에 표시됩니다 -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
    try {
        const complaintsResponse = await fetch('/api/complaints');
        const complaints = await complaintsResponse.json();
        
        document.getElementById('totalComplaintsCount').textContent = complaints.length;
        
        
        const completed = complaints.filter(c => c.status === '조치완료').length;
        const unresolved = complaints.length - completed;
        
        document.getElementById('unresolvedCount').textContent = unresolved;
        document.getElementById('completedCount').textContent = completed;
        
        const projectsResponse = await fetch('/api/projects');
        const projects = await projectsResponse.json();
        
        const projectsTbody = document.getElementById('dashboardTableBody');
        projects.slice(0, 5).forEach(project => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${project.project_code}</td>
                <td><a href="/project_detail.html?id=${project.id}" class="text-dark text-decoration-none">${project.name}</a></td>
                <td>${project.customer_name}</td>
                <td>${project.product_type || '-'}</td>
                <td><span class="badge bg-primary">${project.status}</span></td>
            `;
            projectsTbody.appendChild(tr);
        });

        const receptionsResponse = await fetch('/api/receptions');
        const receptions = await receptionsResponse.json();
        
        const receptionsTbody = document.getElementById('recentReceptionsTableBody');
        receptions.slice(0, 5).forEach(r => {
            const urgentBadge = r.is_urgent 
                ? '<span class="badge bg-danger"><i class="bi bi-exclamation-triangle-fill"></i> 긴급</span>' 
                : '-';
            const confirmedBadge = r.dept_confirmed 
                ? '<span class="badge bg-success"><i class="bi bi-check-lg"></i> 확인</span>' 
                : '<span class="badge bg-secondary">미확인</span>';
            
            const channelIcon = {
                '메일': '<i class="bi bi-envelope"></i>',
                '유선': '<i class="bi bi-telephone"></i>',
                '현장발생': '<i class="bi bi-geo-alt"></i>'
            };
            
            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            tr.onclick = () => location.href = `/reception_detail.html?id=${r.id}`;
            tr.innerHTML = `
                <td>${r.reception_no}</td>
                <td>${r.title}</td>
                <td>${r.customer_name}</td>
                <td>${r.department}</td>
                <td>${r.receptionist}</td>
                <td>${r.reception_date}</td>
                <td>${r.deadline || '-'}</td>
                <td>${urgentBadge}</td>
                <td>${channelIcon[r.reception_channel] || ''} ${r.reception_channel}</td>
                <td>${confirmedBadge}</td>
            `;
            receptionsTbody.appendChild(tr);
        });
    } catch (err) {
        console.error('Error loading dashboard:', err);
    }
});
    </script>
</body>
</html>
